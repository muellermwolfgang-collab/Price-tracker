name: Gravel Frameset Tracker

on:
  schedule:
    # Twice a day (07:00 and 19:00 UTC) -- adjust to taste. Frameset prices
    # don't move fast enough to need more than this, and less frequent
    # scraping is politer to the two working retailers.
    - cron: '0 7,19 * * *'
  workflow_dispatch: {}  # lets you trigger a manual run from the GitHub app/website

permissions:
  contents: write  # needed so the workflow can commit updated models.json/candidates.json back

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install --with-deps chromium

      - name: Run tracker
        working-directory: gravel_frameset_tracker
        run: python -u main.py

      - name: Commit updated model list / discovered candidates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gravel_frameset_tracker/models.json
          if [ -f gravel_frameset_tracker/candidates.json ]; then
            git add gravel_frameset_tracker/candidates.json
          fi
          git diff --staged --quiet || git commit -m "Gravel frameset tracker: update model data [skip ci]"
          git push
