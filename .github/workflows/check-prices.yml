name: Check Prices

on:
  schedule:
    # Every 2 hours, 6:00-20:00 CEST (= 04:00-18:00 UTC in summer, since
    # cron always runs in UTC and doesn't shift for daylight saving).
    # In winter (CET, UTC+1) this same line runs 5:00-19:00 local instead -
    # shift every hour back by one (to "0 5,7,9,11,13,15,17,19 * * *") if
    # you want it exact year-round; not worth the upkeep otherwise.
    - cron: "0 4,6,8,10,12,14,16,18 * * *"
  workflow_dispatch: {}     # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browser
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Install Playwright browser (only on cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install --with-deps chromium

      - name: Install Playwright system libraries (cache hit - browser already present)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: Run price check
        run: python check_prices.py

      - name: Save updated state
        run: |
          git config user.name "price-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "Update price state"
          git push
